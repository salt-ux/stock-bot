<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Bot Auth</title>
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
  <main class="page">
    <section class="panel">
      <p class="eyebrow">Stock Bot</p>
      <h1>인증</h1>
      <p class="subtitle">최초 1회 회원가입 후 로그인해 주세요.</p>

      <div class="grid-two">
        <form id="register-form" class="form card">
          <h2>회원가입</h2>

          <label for="register-id">아이디</label>
          <input id="register-id" name="id" type="text" placeholder="admin" required />

          <label for="register-password">비밀번호</label>
          <input id="register-password" name="password" type="password" placeholder="최소 5글자" required minlength="5" />

          <button type="submit">회원가입</button>
        </form>

        <form id="login-form" class="form card">
          <h2>로그인</h2>

          <label for="login-id">아이디</label>
          <input id="login-id" name="id" type="text" placeholder="admin" required />

          <label for="login-password">비밀번호</label>
          <input id="login-password" name="password" type="password" placeholder="•••••" required minlength="5" />

          <button type="submit">로그인</button>
        </form>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="/static/login.js"></script>
</body>
</html>
