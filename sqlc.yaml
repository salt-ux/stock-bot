version: "2"
sql:
  - engine: "mysql"
    schema:
      - "migrations"
    queries:
      - "internal/repository/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
        emit_db_tags: true
